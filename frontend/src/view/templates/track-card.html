<div class="col-md-6 col-lg-4">
  <div class="card h-100 shadow-sm product-card border-0">
    <div class="card-body d-flex flex-column">
      <h6 class="card-title text-truncate mb-1" title="{{name}}">{{name}}</h6>
      <p class="card-text small text-muted text-truncate mb-2">{{artists}}</p>
      <div class="mt-auto">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="badge bg-light text-dark border">Pop: {{popularity}}</span>
          <small class="text-muted">{{album}}</small>
        </div>
        <button class="btn btn-outline-primary btn-sm w-100 btn-like" data-uri="{{track_uri}}" type="button">
          ❤️ Curtir
        </button>
      </div>
    </div>
  </div>
</div>
